<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="UmbraFi" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="UmbraFi" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>UmbraFi</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // If JS bundle fails (stale cache, old SW, etc), force one recovery reload.
      window.__APP_LOADED = false;
      (function () {
        var RECOVER_FLAG = '_recover';

        var getUrl = function () {
          try {
            return new URL(location.href);
          } catch (error) {
            return null;
          }
        };

        var hasRecovered = function () {
          var url = getUrl();
          if (!url) {
            return location.search.indexOf(RECOVER_FLAG + '=1') !== -1;
          }
          return url.searchParams.get(RECOVER_FLAG) === '1';
        };

        var showBootFailure = function () {
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;color:#0A0A0A;text-align:center;">' +
            '<div><h1 style="font-size:18px;margin:0 0 8px;">Failed to start UmbraFi</h1><p style="font-size:14px;line-height:1.5;margin:0;">Please close this app, reopen from Safari once, then Add to Home Screen again.</p></div>' +
            '</div>';
        };

        var forceReloadOnce = function () {
          var url = getUrl();
          if (!url || hasRecovered()) {
            showBootFailure();
            return;
          }
          url.searchParams.set(RECOVER_FLAG, '1');
          url.searchParams.set('_ts', Date.now().toString());
          location.replace(url.toString());
        };

        setTimeout(function () {
          if (window.__APP_LOADED) return;

          if (!('serviceWorker' in navigator)) {
            forceReloadOnce();
            return;
          }

          navigator.serviceWorker
            .getRegistrations()
            .then(function (regs) {
              if (!regs.length) {
                forceReloadOnce();
                return;
              }

              Promise.all(
                regs.map(function (registration) {
                  return registration.unregister();
                })
              )
                .catch(function () {
                  // Ignore unregister failures and still attempt reload recovery.
                })
                .finally(function () {
                  forceReloadOnce();
                });
            })
            .catch(function () {
              forceReloadOnce();
            });
        }, 4000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
